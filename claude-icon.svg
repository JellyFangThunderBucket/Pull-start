<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Rounded square clip -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>

    <!-- Background gradient: deep space indigo to near-black -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>

    <!-- Warm amber glow for the C -->
    <radialGradient id="cGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:0"/>
    </radialGradient>

    <!-- C letter gradient -->
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd580"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>

    <!-- Orbit ring gradient -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7f5af0;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#2cb67d;stop-opacity:0.6"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.05"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for orbit dots -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Clip everything to rounded square -->
  <g clip-path="url(#roundedSquare)">

    <!-- Background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Subtle grid overlay -->
    <rect width="512" height="512" fill="url(#grid)"/>

    <!-- Warm radial glow behind the C -->
    <circle cx="256" cy="256" r="200" fill="url(#cGlow)"/>

    <!-- Outer orbit ring (ellipse, tilted) -->
    <ellipse cx="256" cy="256" rx="185" ry="72"
      fill="none" stroke="url(#orbitGrad)" stroke-width="1.8" stroke-opacity="0.55"
      transform="rotate(-28 256 256)"/>

    <!-- Inner orbit ring -->
    <ellipse cx="256" cy="256" rx="145" ry="56"
      fill="none" stroke="#7f5af0" stroke-width="1.2" stroke-opacity="0.35"
      transform="rotate(-28 256 256)"/>

    <!-- Orbit dots (nodes around the outer ring) -->
    <!-- Top-right node -->
    <circle cx="388" cy="206" r="7" fill="#7f5af0" filter="url(#dotGlow)"/>
    <!-- Bottom-left node -->
    <circle cx="124" cy="306" r="5" fill="#2cb67d" filter="url(#dotGlow)"/>
    <!-- Top-left node -->
    <circle cx="156" cy="188" r="4" fill="#7f5af0" filter="url(#dotGlow)" opacity="0.7"/>
    <!-- Bottom-right node -->
    <circle cx="356" cy="324" r="4" fill="#2cb67d" filter="url(#dotGlow)" opacity="0.6"/>

    <!-- The "C" — bold, centered, glowing amber -->
    <!-- Using a path for a clean open C shape -->
    <path d="
      M 318 156
      A 120 120 0 1 0 318 356
      L 318 316
      A 80 80 0 1 1 318 196
      Z
    "
      fill="url(#cGrad)"
      filter="url(#glowFilter)"
    />

    <!-- Code brackets in the bottom corners (subtle) -->
    <!-- Left bracket -->
    <text x="62" y="440" font-family="'Courier New', monospace" font-size="52" fill="#7f5af0" opacity="0.45" font-weight="bold">&lt;/&gt;</text>

    <!-- Subtle horizontal scan line at bottom -->
    <rect x="0" y="468" width="512" height="1.5" fill="#7f5af0" opacity="0.18"/>

    <!-- Tiny star-like sparkles in bg -->
    <circle cx="80"  cy="90"  r="1.5" fill="white" opacity="0.5"/>
    <circle cx="430" cy="70"  r="1"   fill="white" opacity="0.4"/>
    <circle cx="460" cy="180" r="1.5" fill="white" opacity="0.3"/>
    <circle cx="50"  cy="380" r="1"   fill="white" opacity="0.4"/>
    <circle cx="400" cy="440" r="1.5" fill="white" opacity="0.3"/>
    <circle cx="180" cy="60"  r="1"   fill="white" opacity="0.35"/>
    <circle cx="340" cy="470" r="1"   fill="white" opacity="0.3"/>

  </g>

  <!-- Rounded border highlight -->
  <rect width="512" height="512" rx="112" ry="112"
    fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.08"/>
</svg>
